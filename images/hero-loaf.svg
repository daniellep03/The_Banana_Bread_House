<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#FFF8F0"/>
  <ellipse cx="400" cy="430" rx="320" ry="40" fill="#8EC5E9" opacity="0.18"/>

  <!-- cutting board -->
  <rect x="140" y="380" width="520" height="40" rx="20" fill="#A9744F"/>
  <rect x="140" y="370" width="520" height="20" rx="10" fill="#BD8A62"/>

  <!-- loaf body -->
  <g>
    <ellipse cx="400" cy="330" rx="230" ry="120" fill="#6B3E26"/>
    <path d="M170 330 Q400 180 630 330 Q630 270 400 250 Q170 270 170 330 Z" fill="#8B5A33"/>
    <path d="M195 320 Q400 200 605 320 Q605 280 400 265 Q195 280 195 320 Z" fill="#A8703F"/>
    <!-- crack lines -->
    <path d="M260 270 Q280 240 300 270" stroke="#6B3E26" stroke-width="4" fill="none" opacity="0.5"/>
    <path d="M380 250 Q400 220 420 250" stroke="#6B3E26" stroke-width="4" fill="none" opacity="0.5"/>
    <path d="M500 270 Q520 240 540 270" stroke="#6B3E26" stroke-width="4" fill="none" opacity="0.5"/>
  </g>

  <!-- banana slices on top -->
  <g>
    <circle cx="330" cy="300" r="22" fill="#FFF8F0" stroke="#FFD54F" stroke-width="4"/>
    <circle cx="330" cy="300" r="6" fill="#6B3E26"/>
    <circle cx="400" cy="285" r="22" fill="#FFF8F0" stroke="#FFD54F" stroke-width="4"/>
    <circle cx="400" cy="285" r="6" fill="#6B3E26"/>
    <circle cx="470" cy="300" r="22" fill="#FFF8F0" stroke="#FFD54F" stroke-width="4"/>
    <circle cx="470" cy="300" r="6" fill="#6B3E26"/>
  </g>

  <!-- steam swirls -->
  <path d="M300 180 Q290 150 310 130 Q330 110 315 80" stroke="#FFD54F" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M500 180 Q510 150 490 130 Q470 110 485 80" stroke="#FFD54F" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- whole banana decoration -->
  <path d="M120 470 Q100 510 140 540 Q190 560 220 520 Q200 500 170 500 Q150 480 120 470 Z" fill="#FFD54F"/>
  <path d="M120 470 Q100 510 140 540" stroke="#6B3E26" stroke-width="3" fill="none" opacity="0.4"/>

  <path d="M680 480 Q700 520 660 545 Q615 562 590 525 Q610 505 640 505 Q660 485 680 480 Z" fill="#FFD54F"/>
  <path d="M680 480 Q700 520 660 545" stroke="#6B3E26" stroke-width="3" fill="none" opacity="0.4"/>
</svg>
