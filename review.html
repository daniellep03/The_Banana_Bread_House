<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | The Banana Bread House</title>
<meta name="description" content="Loved your banana bread? Leave The Banana Bread House a review!">
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/logo.png">
<style>
  /* Page-specific tweaks for the review form */
  .review-hero {
    text-align: center;
    padding: 70px 0 20px;
  }
  .review-hero .logo-badge {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 16px;
    box-shadow: var(--shadow-soft);
  }
  .review-hero h1 { font-size: 2.2rem; margin-bottom: 10px; }
  .review-hero p { max-width: 480px; margin: 0 auto; font-size: 1.05rem; opacity: 0.85; }

  .review-form {
    max-width: 520px;
    margin: 24px auto 80px;
    text-align: left;
    display: flex;
    flex-direction: column;
    background-color: #fff;
    padding: 36px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
  }
  .review-form label { font-weight: 700; margin-top: 16px; margin-bottom: 6px; }
  .review-form input,
  .review-form select,
  .review-form textarea {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(107, 62, 38, 0.2);
    font-family: var(--font-body);
    font-size: 1rem;
    background-color: #fff;
    color: var(--color-brown);
  }
  .review-form input:focus,
  .review-form select:focus,
  .review-form textarea:focus { outline: 2px solid var(--color-blue-accent); }

  /* Star rating */
  .stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    gap: 6px;
    margin: 6px 0 4px;
  }
  .stars input { display: none; }
  .stars label {
    font-size: 2.6rem;
    color: #e0d5c7;
    cursor: pointer;
    margin: 0;
    transition: color 0.15s ease, transform 0.1s ease;
    line-height: 1;
  }
  .stars label:hover,
  .stars label:hover ~ label,
  .stars input:checked ~ label { color: var(--color-yellow); }
  .stars label:active { transform: scale(1.2); }

  .review-form button { margin-top: 26px; align-self: center; }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    color: var(--color-brown);
    opacity: 0.75;
    font-weight: 600;
    text-decoration: none;
  }
  .back-link:hover { opacity: 1; }
  .review-confirmation {
    text-align: center;
    font-weight: 700;
    color: var(--color-brown);
    background: var(--color-cream);
    border-radius: var(--radius-md);
    padding: 18px;
    margin-top: 18px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="review-hero">
    <img src="images/logo.png" alt="The Banana Bread House logo" class="logo-badge">
    <h1>Leave a Review</h1>
    <p>Thank you for choosing The Banana Bread House! We'd love to hear how you enjoyed your banana bread. 🍌💛</p>
  </div>

  <!-- Reviews are emailed to thebananabreadh@gmail.com via the same Formspree form.
       The hidden _subject field labels them "New Review" so they're easy to spot. -->
  <form id="review-form" class="review-form" action="https://formspree.io/f/xdarzqwq" method="POST" novalidate>
    <input type="hidden" name="_subject" value="⭐ New Review — The Banana Bread House">
    <input type="hidden" name="form_type" value="Review">

    <label>Your Rating</label>
    <div class="stars">
      <input type="radio" id="star5" name="rating" value="5 stars"><label for="star5" title="5 stars">★</label>
      <input type="radio" id="star4" name="rating" value="4 stars"><label for="star4" title="4 stars">★</label>
      <input type="radio" id="star3" name="rating" value="3 stars"><label for="star3" title="3 stars">★</label>
      <input type="radio" id="star2" name="rating" value="2 stars"><label for="star2" title="2 stars">★</label>
      <input type="radio" id="star1" name="rating" value="1 star"><label for="star1" title="1 star">★</label>
    </div>

    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" required>

    <label for="loaf">Which loaf did you try? <span style="font-weight:400;opacity:0.7">(optional)</span></label>
    <select id="loaf" name="loaf">
      <option value="">Select a loaf</option>
      <option value="The Original Loaf">The Original Loaf</option>
      <option value="Chocolate Chip Banana Bread">Chocolate Chip Banana Bread</option>
      <option value="Walnut Banana Bread">Walnut Banana Bread</option>
      <option value="More than one!">More than one!</option>
    </select>

    <label for="review">Your Review</label>
    <textarea id="review" name="review" rows="4" placeholder="Tell us what you loved!" required></textarea>

    <button type="submit" class="btn btn-primary">Submit Review</button>

    <p id="review-confirmation" class="review-confirmation" hidden>
      Thank you so much for your review! 💛 It means the world to a small bakery like ours.
    </p>
  </form>

  <a href="index.html" class="back-link">&larr; Back to The Banana Bread House</a>
</div>

<script>
  var form = document.getElementById('review-form');
  var confirmation = document.getElementById('review-confirmation');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { Accept: 'application/json' }
    })
      .then(function (response) {
        if (response.ok) {
          confirmation.hidden = false;
          form.reset();
          confirmation.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          alert('Something went wrong submitting your review. Please try again.');
        }
      })
      .catch(function () {
        alert('Something went wrong submitting your review. Please try again.');
      });
  });
</script>

</body>
</html>
